name: Build Klenny Code

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: klennycode-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set release version
        working-directory: agent
        shell: bash
        # Keep the major.minor already committed in package.json (bump that by hand when we
        # want a "real" version change, e.g. 0.2.0 -> 0.3.0) and only auto-set the patch number
        # to the CI run number, so every build gets a unique version without clobbering the
        # minor bump back to 0.1.x like this step used to do.
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          npm version "${BASE_VERSION}.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: agent
        run: npm install

      - name: Generate icons
        working-directory: agent
        run: npm run icons

      - name: Build app
        working-directory: agent
        run: npm run build

      - name: Package and publish (${{ matrix.platform }})
        working-directory: agent
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klennycode-${{ matrix.platform }}
          path: |
            agent/dist/*.exe
            agent/dist/*.dmg
            agent/dist/*.zip
            agent/dist/*.AppImage
            agent/dist/*.deb
            agent/dist/latest*.yml
          if-no-files-found: warn
